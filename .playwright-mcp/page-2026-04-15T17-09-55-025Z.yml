        - heading "How Xecuit Builds Ecosystems" [level=2] [ref=e49]
        - paragraph [ref=e50]: We approach investing as portfolio architects, not deal collectors. Risk is managed structurally through ecosystem design, not reactively through financial engineering. We build for long-duration ownership, parallel ecosystem development, and opportunistic liquidity.
