          - heading "How we deploy capital" [level=3] [ref=e75]
          - paragraph [ref=e76]: We deploy asset-backed capital across platform and follow-on acquisitions. Capital is allocated flexibly through Xecuit balance sheet assets, platform balance sheets, and strategic reserves without reliance on fund commitments or exit-driven recycling.
        - generic [ref=e77]:
          - img [ref=e79]
          - heading "How we execute" [level=3] [ref=e84]
          - paragraph [ref=e85]: We apply data science and AI-enabled workflows to support underwriting, ecosystem design, and operating execution. These tools enhance decision quality, coordination, and scalability across ecosystems without replacing disciplined judgment.
