          - heading "How we manage Risk" [level=3] [ref=e67]
          - paragraph [ref=e68]: Our hedge model informs industry selection, acquisition targeting, and ecosystem composition. Businesses are selected to balance exposure across demand, supply, operations, and growth drivers managing risk structurally rather than reactively.
        - generic [ref=e69]:
