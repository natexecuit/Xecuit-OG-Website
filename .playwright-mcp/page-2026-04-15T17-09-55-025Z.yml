        - paragraph [ref=e90]: Xecuit Holdings engages selectively with founders, operators, institutions, and advisors across a wide range of transaction objectives. While our portfolio is structured for long-duration value creation, we are flexible in how we partner supporting founders seeking a full or partial exit, transitional ownership, or continued involvement post-transaction. Our focus is on alignment, discretion, and disciplined execution, regardless of transaction structure or time horizon. We prioritize the right outcome for the business, the founder, and the broader ecosystem.
